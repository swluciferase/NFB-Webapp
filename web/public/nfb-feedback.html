<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NFB Feedback</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  #overlay { position: absolute; inset: 0; background: #000; opacity: 1; pointer-events: none; transition: opacity 0.4s ease; }
</style>
</head>
<body>
  <div id="overlay"></div>
  <script>
    var params = new URLSearchParams(location.search);
    var src = params.get('url');
    if (src && /^https?:\/\//i.test(src)) {
      var iframe = document.createElement('iframe');
      iframe.src = src;
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
      iframe.allowFullscreen = true;
      document.body.insertBefore(iframe, document.getElementById('overlay'));
    }
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'nfb_overlay') {
        document.getElementById('overlay').style.opacity = e.data.opacity;
      }
    });
  </script>
</body>
</html>
